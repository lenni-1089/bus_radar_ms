<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Busradar Münster — Live Map</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #0a0e14; --surface: #111820; --surface2: #1a2230;
    --border: #1e2a3a; --text: #e0e8f0; --text-dim: #6b7f96;
    --accent: #22d3ee; --accent-glow: rgba(34,211,238,0.15);
    --green: #34d399; --yellow: #fbbf24; --orange: #f97316; --red: #f43f5e;
    --mono: 'JetBrains Mono', monospace; --sans: 'DM Sans', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:var(--sans); height:100vh; overflow:hidden; }

  /* ── Header ── */
  .header {
    height:52px; padding:0 20px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
    background:var(--surface); position:relative; z-index:1000;
  }
  .header-left { display:flex; align-items:center; gap:14px; }
  .logo { font-family:var(--mono); font-size:15px; font-weight:700; color:var(--accent); letter-spacing:-0.5px; }
  .logo span { color:var(--text-dim); font-weight:400; }
  .status-badge {
    display:flex; align-items:center; gap:8px; padding:4px 12px; border-radius:20px;
    font-size:11px; font-weight:600; font-family:var(--mono);
    background:rgba(239,68,68,0.12); color:var(--red); border:1px solid rgba(239,68,68,0.25); transition:all 0.3s;
  }
  .status-badge.connected { background:rgba(52,211,153,0.12); color:var(--green); border-color:rgba(52,211,153,0.25); }
  .status-dot { width:7px; height:7px; border-radius:50%; background:currentColor; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .controls { display:flex; gap:8px; align-items:center; }
  button {
    font-family:var(--mono); font-size:11px; font-weight:600; padding:7px 14px; border-radius:8px;
    border:1px solid var(--border); background:var(--surface2); color:var(--text); cursor:pointer; transition:all 0.2s;
  }
  button:hover { background:var(--border); }
  button.primary { background:var(--accent); color:var(--bg); border-color:var(--accent); }
  button.primary:hover { filter:brightness(1.15); }
  button.danger { color:var(--red); border-color:rgba(244,63,94,0.3); }

  /* ── Layout ── */
  .main { display:grid; grid-template-columns:280px 1fr; height:calc(100vh - 52px); }

  /* ── Sidebar ── */
  .sidebar {
    border-right:1px solid var(--border); overflow-y:auto; background:var(--surface);
    display:flex; flex-direction:column; z-index:900;
  }
  .stats-grid {
    display:grid; grid-template-columns:1fr 1fr 1fr; gap:1px; background:var(--border);
    border-bottom:1px solid var(--border); flex-shrink:0;
  }
  .stat-card { background:var(--surface); padding:10px 12px; }
  .stat-label { font-size:9px; text-transform:uppercase; letter-spacing:1px; color:var(--text-dim); margin-bottom:2px; }
  .stat-value { font-family:var(--mono); font-size:17px; font-weight:700; color:var(--text); }
  .stat-value.accent { color:var(--accent); }
  .stat-value.green { color:var(--green); }
  .stat-value.yellow { color:var(--yellow); }
  .stat-value.red { color:var(--red); }

  .sidebar-section-header {
    padding:8px 12px; border-bottom:1px solid var(--border);
    font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-dim);
    display:flex; justify-content:space-between; align-items:center;
    background:var(--surface); position:sticky; top:0; z-index:10; flex-shrink:0;
  }
  .bus-count { font-family:var(--mono); color:var(--accent); font-size:12px; font-weight:700; }

  .panel-row {
    padding:6px 10px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    font-size:11px; color:var(--text-dim); flex-shrink:0;
  }
  .panel-row label { cursor:pointer; display:flex; align-items:center; gap:5px; }
  .panel-row input[type="checkbox"] { accent-color:var(--accent); }
  .panel-row select {
    font-family:var(--mono); font-size:10px; padding:3px 6px; border-radius:4px;
    border:1px solid var(--border); background:var(--surface2); color:var(--text); outline:none;
  }

  /* Line filter chips */
  .line-filter-grid {
    padding:6px 10px; border-bottom:1px solid var(--border); flex-shrink:0;
    display:flex; flex-wrap:wrap; gap:4px; max-height:90px; overflow-y:auto;
  }
  .line-chip {
    font-family:var(--mono); font-size:9px; font-weight:700;
    padding:2px 7px; border-radius:4px; cursor:pointer;
    color:#fff; opacity:1; transition:opacity 0.15s;
    border:1.5px solid transparent;
    user-select:none;
  }
  .line-chip.off { opacity:0.2; }
  .line-filter-actions { display:flex; gap:4px; margin-left:auto; }
  .line-filter-actions button { padding:2px 8px; font-size:9px; border-radius:4px; }

  .filter-bar { padding:6px 8px; border-bottom:1px solid var(--border); flex-shrink:0; }
  .filter-bar input {
    width:100%; font-family:var(--mono); font-size:11px; padding:6px 10px; border-radius:6px;
    border:1px solid var(--border); background:var(--surface2); color:var(--text); outline:none;
  }
  .filter-bar input:focus { border-color:var(--accent); }
  .filter-bar input::placeholder { color:var(--text-dim); }

  .bus-list { overflow-y:auto; flex:1; padding:4px 6px; }
  .bus-item {
    display:flex; align-items:center; gap:7px; padding:7px 8px; border-radius:6px;
    cursor:pointer; transition:background 0.15s; font-size:12px;
  }
  .bus-item:hover { background:var(--surface2); }
  .bus-item.selected { background:var(--accent-glow); border:1px solid rgba(34,211,238,0.2); }
  .bus-line-badge {
    font-family:var(--mono); font-weight:700; font-size:11px;
    min-width:26px; height:20px; display:flex; align-items:center; justify-content:center;
    border-radius:4px; color:#fff; flex-shrink:0;
  }
  .bus-info { flex:1; min-width:0; }
  .bus-direction { color:var(--text); font-weight:500; font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .bus-meta { color:var(--text-dim); font-size:10px; font-family:var(--mono); }
  .delay-badge { font-family:var(--mono); font-size:10px; font-weight:600; padding:2px 6px; border-radius:4px; white-space:nowrap; }
  .delay-ok { background:rgba(52,211,153,0.12); color:var(--green); }
  .delay-warn { background:rgba(251,191,36,0.12); color:var(--yellow); }
  .delay-bad { background:rgba(249,115,22,0.12); color:var(--orange); }
  .delay-critical { background:rgba(244,63,94,0.12); color:var(--red); }

  /* ── Map ── */
  #map { width:100%; height:100%; }

  /* Popup — light */
  .leaflet-popup-content-wrapper {
    background:#fff !important; color:#1a1a2e !important;
    border:1px solid #e2e8f0 !important; border-radius:10px !important;
    box-shadow:0 4px 20px rgba(0,0,0,0.12) !important; font-family:var(--sans) !important;
  }
  .leaflet-popup-tip { background:#fff !important; }
  .leaflet-popup-content { margin:12px 14px !important; font-size:12px !important; }
  .popup-header { display:flex; align-items:center; gap:8px; margin-bottom:8px; padding-bottom:8px; border-bottom:1px solid #e2e8f0; }
  .popup-line { font-family:var(--mono); font-weight:700; font-size:14px; min-width:32px; height:26px; display:flex; align-items:center; justify-content:center; border-radius:5px; color:#fff; }
  .popup-dest { font-weight:600; font-size:13px; color:#1a1a2e; }
  .popup-row { display:flex; justify-content:space-between; padding:2px 0; font-size:11px; }
  .popup-label { color:#94a3b8; }
  .popup-val { font-family:var(--mono); font-weight:600; color:#334155; }

  /* Bus marker with direction arrow */
  .bus-marker-wrap {
    position:relative;
    display:flex; align-items:center; justify-content:center;
  }
  .bus-marker {
    display:flex; align-items:center; justify-content:center;
    font-family:'JetBrains Mono',monospace; font-weight:700; font-size:9px; color:#fff;
    border-radius:4px; border:1.5px solid rgba(255,255,255,0.95);
    box-shadow:0 1px 4px rgba(0,0,0,0.2);
    text-align:center; line-height:1; cursor:pointer;
    min-width:20px; height:16px; padding:0 3px;
    transition:transform 0.15s;
  }
  .bus-marker:hover { transform:scale(1.5); z-index:9999 !important; }
  .bus-arrow {
    position:absolute;
    width:0; height:0;
    border-left:4px solid transparent;
    border-right:4px solid transparent;
    border-bottom:7px solid currentColor;
    top:-9px; left:50%; transform:translateX(-50%);
    filter:drop-shadow(0 0 1px rgba(0,0,0,0.3));
    transition:transform 0.3s;
  }

  /* ── User location marker ── */
  .user-loc-outer {
    width:28px; height:28px; border-radius:50%;
    background:rgba(59,130,246,0.18);
    display:flex; align-items:center; justify-content:center;
    animation:locPulse 2.5s ease-out infinite;
  }
  .user-loc-inner {
    width:12px; height:12px; border-radius:50%;
    background:#3b82f6; border:2.5px solid #fff;
    box-shadow:0 1px 6px rgba(59,130,246,0.45);
  }
  @keyframes locPulse { 0%{transform:scale(1);opacity:1} 100%{transform:scale(2.2);opacity:0} }

  /* ── Bottom strip ── */
  .msg-strip {
    position:fixed; bottom:0; left:280px; right:0; height:26px;
    background:var(--surface); border-top:1px solid var(--border);
    display:flex; align-items:center; padding:0 14px;
    font-family:var(--mono); font-size:10px; color:var(--text-dim); z-index:1000; gap:16px;
  }
  @media (max-width:800px) {
    .main { grid-template-columns:1fr; }
    .sidebar { display:none; }
    .msg-strip { left:0; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">BUSRADAR<span>.live</span></div>
    <div class="status-badge" id="status"><div class="status-dot"></div><span>CONNECTING…</span></div>
  </div>
  <div class="controls">
    <button id="locateBtn" onclick="locateUser()" title="Show my location">📍 Me</button>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Buses</div><div class="stat-value accent" id="vehicleCount">—</div></div>
      <div class="stat-card"><div class="stat-label">Lines</div><div class="stat-value" id="lineCount">—</div></div>
      <div class="stat-card"><div class="stat-label">Avg Delay</div><div class="stat-value green" id="avgDelay">—</div></div>
    </div>

    <!-- Trail controls -->
    <div class="panel-row">
      <label><input type="checkbox" id="trailCheck" checked onchange="toggleTrails()"> Trails</label>
      <select id="trailMax" onchange="trimAllTrails()">
        <option value="30">30 pts</option>
        <option value="80" selected>80 pts</option>
        <option value="200">200 pts</option>
        <option value="9999">&infin;</option>
      </select>
      <button style="margin-left:auto; padding:3px 8px; font-size:10px;" onclick="clearTrails()">Clear</button>
    </div>

    <!-- Line filter -->
    <div class="sidebar-section-header">
      Lines
      <div class="line-filter-actions">
        <button onclick="setAllLines(true)">All</button>
        <button onclick="setAllLines(false)">None</button>
      </div>
    </div>
    <div class="line-filter-grid" id="lineFilterGrid"></div>

    <!-- Bus list -->
    <div class="filter-bar">
      <input type="text" id="filterInput" placeholder="Search..." oninput="renderBusList()" />
    </div>
    <div class="sidebar-section-header">
      Active Buses <span class="bus-count" id="busListCount">0</span>
    </div>
    <div class="bus-list" id="busList"></div>
  </div>

  <div id="map"></div>
</div>

<div class="msg-strip">
  <span>Updates: <strong id="msgCount">0</strong></span>
  <span>Last: <strong id="lastUpdate">—</strong></span>
  <span id="lastMsg" style="flex:1; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;"></span>
</div>

<script>
// ── Line colors ──
const LINE_COLORS = {
  '1':'#3b82f6','2':'#7c3aed','3':'#db2777','4':'#e11d48',
  '5':'#ea580c','6':'#ca8a04','7':'#65a30d','8':'#16a34a',
  '9':'#0d9488','10':'#0891b2','11':'#4f46e5','12':'#9333ea',
  '13':'#c026d3','14':'#ec4899','15':'#f97316','16':'#eab308',
  '17':'#22c55e','18':'#14b8a6','19':'#0ea5e9','20':'#6366f1',
  '22':'#a855f7','33':'#d946ef','34':'#f43f5e','68':'#f59e0b'
};
function lineColor(line) {
  return LINE_COLORS[line] || '#'+((parseInt(line,36)*2654435761>>>0)%0xAAAAAA+0x555555).toString(16);
}

// ── State ──
let eventSource = null, msgCount = 0;
let vehicles = {};       // fahrtbezeichner → enriched vehicle object
let markers = {};
let trails = {};
let selectedId = null;
let lineFilter = {};
let knownLines = new Set();

// ── Map ──
const map = L.map('map', { zoomControl:false, attributionControl:true })
  .setView([51.9607, 7.6261], 13);
L.control.zoom({ position:'topright' }).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains:'abcd', maxZoom:19
}).addTo(map);

const trailLayer = L.layerGroup().addTo(map);

// ── Bearing calc ──
function bearing(lat1, lon1, lat2, lon2) {
  const toRad = d => d * Math.PI / 180;
  const toDeg = r => r * 180 / Math.PI;
  const dLon = toRad(lon2 - lon1);
  const y = Math.sin(dLon) * Math.cos(toRad(lat2));
  const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) -
            Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(dLon);
  return (toDeg(Math.atan2(y, x)) + 360) % 360;
}

// ── Line filter ──
function isLineVisible(line) {
  if (!line) return true;
  return lineFilter[line] !== false;
}
function toggleLine(line) {
  lineFilter[line] = !isLineVisible(line);
  applyLineFilter();
  renderLineChips();
}
function setAllLines(on) {
  knownLines.forEach(l => { lineFilter[l] = on; });
  applyLineFilter();
  renderLineChips();
}
function applyLineFilter() {
  Object.keys(vehicles).forEach(id => {
    const v = vehicles[id];
    const vis = isLineVisible(v.linientext);
    if (markers[id]) {
      if (vis) { if (!map.hasLayer(markers[id])) map.addLayer(markers[id]); }
      else { if (map.hasLayer(markers[id])) map.removeLayer(markers[id]); }
    }
    if (trails[id]) {
      trails[id].segments.forEach(seg => {
        if (vis) { if (!trailLayer.hasLayer(seg)) trailLayer.addLayer(seg); }
        else { if (trailLayer.hasLayer(seg)) trailLayer.removeLayer(seg); }
      });
    }
  });
  renderBusList();
}
function renderLineChips() {
  const grid = document.getElementById('lineFilterGrid');
  const sorted = [...knownLines].sort((a,b) => (parseInt(a)||999) - (parseInt(b)||999));
  grid.innerHTML = sorted.map(l => {
    const bg = lineColor(l);
    const off = !isLineVisible(l) ? ' off' : '';
    return `<div class="line-chip${off}" style="background:${bg}" onclick="toggleLine('${l}')">${esc(l)}</div>`;
  }).join('');
}

// ══════════════════════════════════════════════════════════════════════════════
// SSE CONNECTION — replaces the old WebSocket logic
// ══════════════════════════════════════════════════════════════════════════════
//
// The Flask /stream endpoint sends one SSE event per second.
// Each event contains the FULL snapshot of all current bus positions:
//   { "fahrtbezeichner_1": { latitude, longitude, linienid, ... }, ... }
//
// We diff this snapshot against our local `vehicles` to detect:
//   - New/updated buses  → upsert marker + trail point
//   - Disappeared buses  → remove marker + trail (they got a REMOVE on the server side)

function connect() {
  const status = document.getElementById('status');

  eventSource = new EventSource('/stream');

  eventSource.onopen = () => {
    status.classList.add('connected');
    status.querySelector('span').textContent = 'LIVE';
  };

  eventSource.onmessage = (event) => {
    msgCount++;
    document.getElementById('msgCount').textContent = msgCount;
    document.getElementById('lastUpdate').textContent =
      new Date().toLocaleTimeString('de-DE', { hour12:false });

    let snapshot;
    try { snapshot = JSON.parse(event.data); } catch { return; }

    const snapshotKeys = new Set(Object.keys(snapshot));
    let newLines = false;
    let modCount = 0, delCount = 0;

    // ── Process updates / new buses ──
    for (const [fkey, pos] of Object.entries(snapshot)) {
      modCount++;
      const lat = pos.latitude;
      const lon = pos.longitude;
      const delay = parseInt(pos.delay) || 0;
      const prevV = vehicles[fkey];

      // Use linientext if available, fall back to linienid for display
      const linientext = pos.linientext || pos.linienid || '?';

      vehicles[fkey] = {
        fahrzeugid: pos.fahrzeugid || fkey,
        fahrtbezeichner: fkey,
        linientext: linientext,
        linienid: pos.linienid,
        richtungstext: pos.richtungstext,
        delay: delay,
        lon: lon,
        lat: lat,
        akthst: pos.akthst,
        nachhst: pos.nachhst,
        sequenz: pos.sequenz,
        fahrtstatus: pos.fahrtstatus,
        betriebstag: pos.betriebstag,
        operation: pos.operation,
        _ts: Date.now(),
        _bearing: prevV && prevV.lat && prevV.lon
            && (prevV.lat !== lat || prevV.lon !== lon)
          ? bearing(prevV.lat, prevV.lon, lat, lon)
          : (prevV ? prevV._bearing : null),
        _prevLat: prevV?.lat,
        _prevLon: prevV?.lon,
      };

      if (linientext && !knownLines.has(linientext)) {
        knownLines.add(linientext);
        newLines = true;
      }

      if (isLineVisible(linientext)) {
        addTrailPoint(fkey, lat, lon);
        updateMarker(fkey);
      }
    }

    // ── Detect removed buses (were in vehicles, not in snapshot) ──
    for (const oldKey of Object.keys(vehicles)) {
      if (!snapshotKeys.has(oldKey)) {
        delCount++;
        removeVehicle(oldKey);
      }
    }

    if (newLines) renderLineChips();
    updateStats();
    renderBusList();
    document.getElementById('lastMsg').textContent =
      `${snapshotKeys.size} buses (${modCount} active, ${delCount} removed)`;
  };

  eventSource.onerror = () => {
    status.classList.remove('connected');
    status.querySelector('span').textContent = 'RECONNECTING…';
    // EventSource auto-reconnects — no manual retry needed
  };
}


// ── Trails with fade + arrows ──
function getMaxTrailPts() {
  return parseInt(document.getElementById('trailMax').value) || 80;
}

function addTrailPoint(id, lat, lon) {
  if (!document.getElementById('trailCheck').checked) return;
  const v = vehicles[id];
  if (!v || lat == null || lon == null) return;

  if (!trails[id]) {
    trails[id] = { points: [], segments: [] };
  }

  const t = trails[id];
  const last = t.points[t.points.length - 1];
  if (last && last[0] === lat && last[1] === lon) return;

  t.points.push([lat, lon]);

  const max = getMaxTrailPts();
  if (t.points.length > max) t.points = t.points.slice(-max);

  rebuildTrailSegments(id);
}

function rebuildTrailSegments(id) {
  const t = trails[id];
  if (!t) return;
  const v = vehicles[id];
  if (!v) return;

  t.segments.forEach(s => trailLayer.removeLayer(s));
  t.segments = [];

  const pts = t.points;
  if (pts.length < 2) return;

  const color = lineColor(v.linientext);
  const numSegs = pts.length - 1;
  const chunkSize = Math.max(1, Math.ceil(numSegs / 15));

  for (let i = 0; i < numSegs; i += chunkSize) {
    const end = Math.min(i + chunkSize, numSegs);
    const segPts = pts.slice(i, end + 1);
    const progress = (i + chunkSize / 2) / numSegs;
    const opacity = 0.08 + progress * 0.45;
    const weight = 1.5 + progress * 1.5;

    const seg = L.polyline(segPts, {
      color, weight, opacity,
      smoothFactor: 1, lineCap: 'round', lineJoin: 'round'
    });
    trailLayer.addLayer(seg);
    t.segments.push(seg);
  }

  if (pts.length >= 4) {
    const arrowInterval = Math.max(3, Math.floor(pts.length / 6));
    for (let i = arrowInterval; i < pts.length - 1; i += arrowInterval) {
      const p1 = pts[i - 1], p2 = pts[i];
      const angle = bearing(p1[0], p1[1], p2[0], p2[1]);
      const progress = i / numSegs;
      const opacity = 0.15 + progress * 0.5;

      const arrowIcon = L.divIcon({
        className: '',
        html: `<div style="
          color:${color};
          opacity:${opacity};
          transform:rotate(${angle}deg);
          font-size:10px;
          line-height:1;
          text-shadow:0 0 2px rgba(255,255,255,0.8);
        ">▲</div>`,
        iconSize: [10, 10],
        iconAnchor: [5, 5]
      });
      const arrowMarker = L.marker(p2, { icon: arrowIcon, interactive: false });
      trailLayer.addLayer(arrowMarker);
      t.segments.push(arrowMarker);
    }
  }
}

function toggleTrails() {
  document.getElementById('trailCheck').checked
    ? map.addLayer(trailLayer)
    : map.removeLayer(trailLayer);
}

function trimAllTrails() {
  const max = getMaxTrailPts();
  Object.keys(trails).forEach(id => {
    const t = trails[id];
    if (t.points.length > max) {
      t.points = t.points.slice(-max);
      rebuildTrailSegments(id);
    }
  });
}

function clearTrails() {
  Object.keys(trails).forEach(id => {
    trails[id].segments.forEach(s => trailLayer.removeLayer(s));
  });
  trails = {};
}

// ── Markers with direction arrow ──
function createBusIcon(line, bearingDeg) {
  const bg = lineColor(line);
  const hasDir = bearingDeg != null && !isNaN(bearingDeg);
  const arrowHtml = hasDir
    ? `<div class="bus-arrow" style="color:${bg}; transform:translateX(-50%) rotate(${bearingDeg}deg); transform-origin:center bottom;"></div>`
    : '';
  return L.divIcon({
    className: '',
    html: `<div class="bus-marker-wrap">
      ${arrowHtml}
      <div class="bus-marker" style="background:${bg}">${esc(line||'?')}</div>
    </div>`,
    iconSize: [22, hasDir ? 28 : 18],
    iconAnchor: [11, hasDir ? 18 : 9],
    popupAnchor: [0, hasDir ? -12 : -11]
  });
}

function updateMarker(id) {
  const v = vehicles[id];
  if (!v || v.lat == null || v.lon == null) return;
  if (!isLineVisible(v.linientext)) return;

  const icon = createBusIcon(v.linientext, v._bearing);

  if (markers[id]) {
    markers[id].setLatLng([v.lat, v.lon]);
    markers[id].setIcon(icon);
  } else {
    const m = L.marker([v.lat, v.lon], { icon, zIndexOffset:200 }).addTo(map);
    m.on('click', () => {
      selectedId = id;
      renderBusList();
      m.bindPopup(buildPopup(vehicles[id]), { maxWidth:250 }).openPopup();
    });
    markers[id] = m;
  }
  if (markers[id].isPopupOpen()) markers[id].setPopupContent(buildPopup(v));
}

function removeVehicle(id) {
  if (markers[id]) { map.removeLayer(markers[id]); delete markers[id]; }
  if (trails[id]) { trails[id].segments.forEach(s=>trailLayer.removeLayer(s)); delete trails[id]; }
  delete vehicles[id];
}

function buildPopup(v) {
  const bg = lineColor(v.linientext);
  const d = v.delay;
  let ds, dc;
  if(d<=0){ds=d+'s';dc='#16a34a';}
  else if(d<60){ds='+'+d+'s';dc='#16a34a';}
  else if(d<120){ds='+'+d+'s';dc='#ca8a04';}
  else if(d<240){ds='+'+d+'s';dc='#ea580c';}
  else{ds='+'+d+'s';dc='#e11d48';}
  const dir = v._bearing != null ? Math.round(v._bearing) + '°' : '—';

  return `
    <div class="popup-header">
      <div class="popup-line" style="background:${bg}">${esc(v.linientext||'?')}</div>
      <div class="popup-dest">${esc(v.richtungstext||'—')}</div>
    </div>
    <div class="popup-row"><span class="popup-label">Trip</span><span class="popup-val" style="font-size:9px">${esc(v.fahrtbezeichner||'—')}</span></div>
    <div class="popup-row"><span class="popup-label">Delay</span><span class="popup-val" style="color:${dc}">${ds}</span></div>
    <div class="popup-row"><span class="popup-label">Heading</span><span class="popup-val">${dir}</span></div>
    <div class="popup-row"><span class="popup-label">Current Stop</span><span class="popup-val">${esc(v.akthst||'—')}</span></div>
    <div class="popup-row"><span class="popup-label">Next Stop</span><span class="popup-val">${esc(v.nachhst||'—')}</span></div>
    <div class="popup-row"><span class="popup-label">Position</span><span class="popup-val">${v.lat?.toFixed(5)}, ${v.lon?.toFixed(5)}</span></div>
  `;
}

// ── Sidebar ──
function updateStats() {
  const entries = Object.values(vehicles);
  document.getElementById('vehicleCount').textContent = entries.length;
  const lines = new Set(entries.map(v=>v.linientext).filter(Boolean));
  document.getElementById('lineCount').textContent = lines.size;
  const delays = entries.map(v=>v.delay);
  const avg = delays.length ? Math.round(delays.reduce((a,b)=>a+b,0)/delays.length) : 0;
  const el = document.getElementById('avgDelay');
  el.textContent = avg + 's';
  el.className = 'stat-value '+(avg<60?'green':avg<120?'yellow':'red');
}

function renderBusList() {
  const list = document.getElementById('busList');
  const filter = (document.getElementById('filterInput').value||'').toLowerCase();
  let entries = Object.values(vehicles).filter(v => isLineVisible(v.linientext));
  if (filter) {
    entries = entries.filter(v =>
      (v.linientext||'').toLowerCase().includes(filter) ||
      (v.richtungstext||'').toLowerCase().includes(filter) ||
      (v.fahrtbezeichner||'').toLowerCase().includes(filter)
    );
  }
  entries.sort((a,b) => {
    const la=parseInt(a.linientext)||999, lb=parseInt(b.linientext)||999;
    return la-lb||(a.richtungstext||'').localeCompare(b.richtungstext||'');
  });
  document.getElementById('busListCount').textContent = entries.length;

  list.innerHTML = entries.map(v => {
    const d=v.delay;
    let dc='delay-ok';
    if(d>=240)dc='delay-critical';else if(d>=120)dc='delay-bad';else if(d>=60)dc='delay-warn';
    const ds=d<0?d+'s':'+'+d+'s';
    const bg=lineColor(v.linientext);
    const sel=v.fahrtbezeichner===selectedId?' selected':'';
    return `
      <div class="bus-item${sel}" onclick="focusBus('${v.fahrtbezeichner}')">
        <div class="bus-line-badge" style="background:${bg}">${esc(v.linientext||'?')}</div>
        <div class="bus-info">
          <div class="bus-direction">${esc(v.richtungstext||'—')}</div>
          <div class="bus-meta">${esc(v.fahrtbezeichner)}</div>
        </div>
        <div class="delay-badge ${dc}">${ds}</div>
      </div>`;
  }).join('');
}

function focusBus(id) {
  selectedId = id;
  const v = vehicles[id];
  if (!v) return;
  renderBusList();
  if (v.lat!=null && v.lon!=null) {
    map.flyTo([v.lat,v.lon], 16, { duration:0.5 });
    if (markers[id]) markers[id].bindPopup(buildPopup(v),{maxWidth:250}).openPopup();
  }
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── User location ──
const MS_CENTER = [51.9607, 7.6261];
const LOC_RADIUS_KM = 20;
let userLocMarker = null;
let userLocCircle = null;

function haversineKm(lat1, lon1, lat2, lon2) {
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1), dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
  return 6371 * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function locateUser() {
  const btn = document.getElementById('locateBtn');
  if (!navigator.geolocation) { btn.textContent = '📍 N/A'; return; }
  btn.textContent = '📍 ...';
  btn.disabled = true;

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;
      const acc = pos.coords.accuracy;
      const dist = haversineKm(lat, lon, MS_CENTER[0], MS_CENTER[1]);

      if (dist > LOC_RADIUS_KM) {
        btn.textContent = '📍 Too far';
        btn.disabled = false;
        setTimeout(() => { btn.textContent = '📍 Me'; }, 2500);
        return;
      }

      if (userLocMarker) { map.removeLayer(userLocMarker); }
      if (userLocCircle) { map.removeLayer(userLocCircle); }

      userLocCircle = L.circle([lat, lon], {
        radius: Math.min(acc, 500),
        color: '#3b82f6', weight: 1, opacity: 0.25,
        fillColor: '#3b82f6', fillOpacity: 0.06, interactive: false
      }).addTo(map);

      const icon = L.divIcon({
        className: '',
        html: '<div class="user-loc-outer"><div class="user-loc-inner"></div></div>',
        iconSize: [28, 28], iconAnchor: [14, 14]
      });
      userLocMarker = L.marker([lat, lon], { icon, zIndexOffset: 1000 })
        .bindPopup(`<div style="font-family:var(--sans);font-size:12px;">
          <strong>Your location</strong><br>
          <span style="font-family:var(--mono);font-size:10px;color:#64748b;">
            ${lat.toFixed(5)}, ${lon.toFixed(5)}<br>
            ±${Math.round(acc)}m &middot; ${dist.toFixed(1)}km from center
          </span>
        </div>`, { maxWidth: 200 })
        .addTo(map);

      map.flyTo([lat, lon], 15, { duration: 0.7 });
      btn.textContent = '📍 Me';
      btn.disabled = false;
    },
    (err) => {
      console.warn(`Geolocation Error [${err.code}]: ${err.message}`);
      
      let errorMsg = '📍 Error';
      if (err.code === 1) errorMsg = '📍 Denied';      // User or browser blocked it
      if (err.code === 2) errorMsg = '📍 Unavailable'; // Device can't find location
      if (err.code === 3) errorMsg = '📍 Timeout';     // Took too long

      btn.textContent = errorMsg;
      btn.disabled = false;
      setTimeout(() => { btn.textContent = '📍 Me'; }, 2500);
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 }
  );
}

// ── Auto-connect on load ──
window.addEventListener('load', () => connect());
</script>
